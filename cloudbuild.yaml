# Cloud Build pipeline para chevamo-backend:
# 1. Install deps en functions/
# 2. Tests Jest backend
# 3. Deploy Cloud Functions + Firestore rules + indexes + storage + remote config
#
# El admin Next.js vive en su propio repo (chevamo-admin) con su propio trigger.

steps:
  # ── Install dependencies ────────────────────────────────
  - id: install-functions
    name: 'node:24'
    entrypoint: 'npm'
    dir: 'functions'
    args: ['ci']

  # ── Tests backend ───────────────────────────────────────
  - id: test-functions
    name: 'node:24'
    entrypoint: 'npx'
    dir: 'functions'
    args: ['jest', '--silent', '--bail']
    waitFor: ['install-functions']

  # ── Deploy Firebase (functions + rules + indexes + storage + remoteconfig) ─
  # Imagen node:20 tiene npm + curl. firebase-tools usa Application Default
  # Credentials del Cloud Build service account.
  - id: deploy
    name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools && \
        firebase deploy \
          --only functions,firestore:rules,firestore:indexes,storage,remoteconfig \
          --project vamo-dbad6 \
          --force \
          --non-interactive
    waitFor: ['test-functions']

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
